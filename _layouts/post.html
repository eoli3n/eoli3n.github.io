---
layout: default
---
{%- include header.html -%}

<!-- Main -->
<div id="main">
	<!-- Post -->
	<article class="shade-two">
	  <div class="container">
			<header>
				<h2>{{- page.title -}}</h2>
				<p>{% if page.author %}{{ page.author }}, {% endif %}{{- page.date | date_to_long_string -}}</p>
			</header>
	    {{- content -}}
        
        <script src="https://utteranc.es/client.js"
           repo="eoli3n/eoli3n.github.io"
           issue-term="pathname"
           theme="github-dark"
           crossorigin="anonymous"
           async>
        </script> 

	  </div>
	</article>
</div>
